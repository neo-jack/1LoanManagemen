version: "3"
services:
  h04front:
    image: nginx:stable-alpine
    container_name: h04front-nginx
    restart: always
    ports:
      - "3004:80"
    volumes:
      # Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # H04Front 构建产物
      - /root/project/1LoanManagement/H04Front/dist:/usr/share/nginx/html:ro
