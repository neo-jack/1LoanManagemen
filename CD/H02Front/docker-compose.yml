version: "3"
services:
  h02front:
    image: nginx:stable-alpine
    container_name: h02front-nginx
    restart: always
    ports:
      - "3002:80"
    volumes:
      # Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # H02Front 构建产物
      - /root/project/1LoanManagement/H02Front/dist:/usr/share/nginx/html:ro
