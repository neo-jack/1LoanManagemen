version: "3"
services:
  h01front:
    image: nginx:stable-alpine
    container_name: h01front-nginx
    restart: always
    ports:
      - "3001:80"
    volumes:
      # Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # H01Front 构建产物
      - /root/project/1LoanManagement/H01Front/dist:/usr/share/nginx/html:ro
